<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenRouter 仪表盘</title>
<style>
:root {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-hover: #1c2128;
  --text: #c9d1d9;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --border: #30363d;
  --border-light: #21262d;
  --input-bg: #0d1117;
  --card-bg: #161b22;
  --table-bg: #161b22;
  --btn-bg: #21262d;
  --btn-border: #30363d;
  --error-bg: #3d1111;
  --error-text: #ff7b72;
  --error-border: #f85149;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --green-btn: #238636;
  --green-btn-border: #2ea043;
  --red-btn: #da3633;
  --red-btn-border: #f85149;
  --spinner-track: #30363d;
  --spinner-fg: #58a6ff;
}
[data-theme="light"] {
  --bg: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-hover: #f3f4f6;
  --text: #24292f;
  --text-secondary: #656d76;
  --text-muted: #959da5;
  --border: #d0d7de;
  --border-light: #e8ecef;
  --input-bg: #ffffff;
  --card-bg: #f6f8fa;
  --table-bg: #f6f8fa;
  --btn-bg: #f6f8fa;
  --btn-border: #d0d7de;
  --error-bg: #fff0f0;
  --error-text: #cf222e;
  --error-border: #cf222e;
  --green: #1a7f37;
  --red: #cf222e;
  --yellow: #9a6700;
  --blue: #0969da;
  --green-btn: #2da44e;
  --green-btn-border: #1a7f37;
  --red-btn: #cf222e;
  --red-btn-border: #b8151e;
  --spinner-track: #d0d7de;
  --spinner-fg: #0969da;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; padding: 24px; min-height: 100vh; transition: background .3s, color .3s;
}
#app { max-width: 960px; margin: 0 auto; }

header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
header h1 { font-size: 20px; font-weight: 600; min-width: 0; }
header .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
#lastUpdated { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
#refreshHint { font-size: 11px; color: var(--text-muted); }
.btn {
  background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text); padding: 6px 14px;
  border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; transition: background .15s;
}
.btn:hover { background: var(--bg-hover); }
.btn-primary { background: var(--green-btn); border-color: var(--green-btn-border); }
.btn-primary:hover { opacity: .9; }
.btn-danger { background: var(--red-btn); border-color: var(--red-btn-border); }
.btn-danger:hover { opacity: .9; }

/* compact select */
.compact-select {
  background: var(--btn-bg); border: 1px solid var(--btn-border); color: var(--text);
  border-radius: 6px; padding: 6px 8px; font-size: 12px; cursor: pointer; outline: none;
  appearance: auto; transition: background .15s;
}
.compact-select:hover { background: var(--bg-hover); }

/* key section */
#keySection { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#keySection .input-wrap { flex: 1; display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; min-width: 200px; transition: border-color .15s; }
#keySection .input-wrap:focus-within { border-color: var(--blue); }
#keySection .input-wrap input { flex: 1; background: transparent; border: none; color: var(--text); padding: 8px 12px; font-size: 13px; outline: none; font-family: monospace; }
#keySection .input-wrap .toggle-vis { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0 10px; font-size: 14px; line-height: 1; }
#keySection .input-wrap .toggle-vis:hover { color: var(--text); }

/* loading */
#loading { text-align: center; padding: 40px 0; color: var(--text-secondary); font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--spinner-track); border-top-color: var(--spinner-fg); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
.btn.spinning .icon { display: inline-block; animation: spin-fast .5s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-fast { to { transform: rotate(360deg); } }

.hidden { display: none !important; }
#error { background: var(--error-bg); border: 1px solid var(--error-border); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: var(--error-text); font-size: 13px; white-space: pre-wrap; }
#keyExpiry { margin: -8px 0 16px; font-size: 12px; padding: 0 4px; }
#keyExpiry.warn { color: var(--yellow); }
#keyExpiry.danger { color: var(--red); }

.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 10px; }
.section-title .note { font-weight: 400; text-transform: none; color: var(--text-muted); font-size: 11px; letter-spacing: 0; }

.card-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
.card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 4px; transition: background .3s, border .3s;
}
.card .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; }
.card .value { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
.card .value.green { color: var(--green); }
.card .value.red { color: var(--red); }
.card .value.yellow { color: var(--yellow); }
.card .value.sm { font-size: 16px; }
.card .sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.table-wrap { background: var(--table-bg); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
.table-wrap.scroll { max-height: 420px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: var(--table-bg); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-hover); }
td.model-name { font-family: monospace; font-size: 12px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.numeric { text-align: right; font-variant-numeric: tabular-nums; }
th.numeric { text-align: right; }

@media (max-width: 820px) {
  .card-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  body { padding: 12px; }
  .card-row { grid-template-columns: 1fr; }
  header h1 { font-size: 17px; width: 100%; }
  header .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; width: 100%; justify-content: flex-start; }
  #lastUpdated { font-size: 11px; }
  #refreshHint { display: none; }
  #keySection { flex-direction: column; align-items: stretch; }
  #keySection .input-wrap { min-width: 0; }
  .card { padding: 12px; }
  .card .value { font-size: 20px; }
  .card .value.sm { font-size: 14px; }
  .table-wrap.scroll { max-height: 300px; }
  th, td { padding: 8px 10px; font-size: 12px; }
  th { font-size: 10px; }
  td.model-name { max-width: 120px; font-size: 11px; }
}
@media (max-width: 420px) {
  .section-title { font-size: 12px; margin: 16px 0 8px; }
  .card .value { font-size: 18px; }
  th, td { padding: 6px 8px; font-size: 11px; }
  td.model-name { max-width: 90px; }
}
</style>
</head>
<body>

      <select class="compact-select" id="themeSelect" title="切换主题">

    </div>

    <div class="card-row">
      <div class="card"><span class="label" data-i18n="todayCost">今日费用</span><span class="value" id="todayUsage">—</span></div>
      <div class="card"><span class="label" data-i18n="weekCost">本周费用</span><span class="value" id="weekUsage">—</span></div>
      <div class="card"><span class="label" data-i18n="monthCost">本月费用</span><span class="value" id="monthUsage">—</span></div>
    </div>

    <div class="card-row" id="activityPeriodRow">
      <div class="card"><span class="label" data-i18n="todayReqToken">今日请求 / Token</span><span class="value sm" id="todayActivity">—</span><span class="sub" data-i18n="delayNote">统计延迟约 1 天</span></div>
      <div class="card"><span class="label" data-i18n="weekReqToken">本周请求 / Token</span><span class="value sm" id="weekActivity">—</span></div>
      <div class="card"><span class="label" data-i18n="monthReqToken">本月请求 / Token</span><span class="value sm" id="monthActivity">—</span></div>
    </div>

    <div class="section-title" data-i18n="accountCredits">信用额度</div>
    <div class="card-row">
      <div class="card"><span class="label" data-i18n="purchased">已购买</span><span class="value" id="creditsPurchased">—</span></div>
      <div class="card"><span class="label" data-i18n="consumed">已消耗</span><span class="value" id="creditsConsumed">—</span></div>
      <div class="card"><span class="label" data-i18n="remainingCredits">剩余额度</span><span class="value" id="creditsRemaining">—</span></div>
    </div>

    <div class="section-title"><span data-i18n="summary">汇总</span> <span class="note" data-i18n="summaryDelay">（活动数据延迟约 1 天）</span></div>
    <div class="card-row">
      <div class="card"><span class="label" data-i18n="totalRequests">总请求数</span><span class="value" id="totalRequests">—</span></div>
      <div class="card"><span class="label" data-i18n="promptTokens">Prompt Tokens</span><span class="value" id="totalPromptTokens">—</span></div>
      <div class="card"><span class="label" data-i18n="completionTokens">Completion Tokens</span><span class="value" id="totalCompletionTokens">—</span></div>
    </div>

    <div class="section-title" data-i18n="usageByModel">各模型用量（汇总）</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="model">模型</th>
            <th class="numeric" data-i18n="requests">请求数</th>
            <th class="numeric" data-i18n="prompt">Prompt</th>
            <th class="numeric" data-i18n="completion">Completion</th>
            <th class="numeric" data-i18n="cost">费用</th>
          </tr>
        </thead>
        <tbody id="modelBody"></tbody>
      </table>
    </div>

    <div class="section-title" data-i18n="recentActivity">最近使用记录</div>
    <div class="table-wrap scroll">
      <table>
        <thead>
          <tr>
            <th data-i18n="date">日期</th>
            <th data-i18n="model">模型</th>
            <th data-i18n="provider">提供商</th>
            <th class="numeric" data-i18n="requests">请求数</th>
            <th class="numeric" data-i18n="prompt">Prompt</th>
            <th class="numeric" data-i18n="completion">Completion</th>
            <th class="numeric" data-i18n="cost">费用</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

const EMOJI_MAP = {

  usageByModel: '🤖', model: '🧠', requests: '🔄', prompt: '📝', completion: '✅', cost: '💵',
  recentActivity: '📜', date: '🗓️', provider: '🔌', loading: '⏳', refresh: '🔄',
  noActivity: '📭', noRecords: '📭',
};
function t(key) {
  let s = (LANG[currentLang] && LANG[currentLang][key]) || key;
  if (EMOJI_MAP[key]) s = EMOJI_MAP[key] + ' ' + s;
  return s;
}
function tfmt(key, data) {
  let s = t(key);
  for (const [k, v] of Object.entries(data)) s = s.replace('{' + k + '}', v);
  return s;
}

const $ = s => document.querySelector(s);
const apiKeyInput = $('#apiKeyInput');
const saveKeyBtn = $('#saveKeyBtn');
const clearKeyBtn = $('#clearKeyBtn');

const loading = $('#loading');
const errorEl = $('#error');
const refreshBtn = $('#refreshBtn');
const lastUpdated = $('#lastUpdated');

const langSelect = $('#langSelect');

/* ---- Theme ---- */
function getSystemTheme() {
  const h = new Date().getHours();
  return h >= 6 && h < 18 ? 'light' : 'dark';
}

function applyTheme(mode) {
  if (mode === 'auto') mode = getSystemTheme();
  document.documentElement.setAttribute('data-theme', mode);
}

themeSelect.addEventListener('change', () => {
  const v = themeSelect.value;
  localStorage.setItem(THEME_STORAGE, v);
  applyTheme(v);
});

// auto switch at minute boundaries
function startThemeTimer() {
  const msToNextMin = (60 - new Date().getSeconds()) * 1000 - new Date().getMilliseconds();
  setTimeout(() => {
    if ((localStorage.getItem(THEME_STORAGE) || 'auto') === 'auto') applyTheme('auto');
    setInterval(() => {
      if ((localStorage.getItem(THEME_STORAGE) || 'auto') === 'auto') applyTheme('auto');
    }, 60000);
  }, msToNextMin);
}

/* ---- Language ---- */
function applyLanguage() {
  currentLang = langSelect.value;
  localStorage.setItem(LANG_STORAGE, currentLang);

  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });

  const themeLabels = { light: '\u2600\u{fe0f} ', dark: '\u{1f319} ', auto: '\u{1f504} ' };
  const themeKeys = { light: 'themeLight', dark: 'themeDark', auto: 'themeAuto' };
  for (const [v, k] of Object.entries(themeKeys)) {
    const o = themeSelect.querySelector('option[value="' + v + '"]');
    if (o) o.textContent = themeLabels[v] + t(k);
  }

  apiKeyInput.placeholder = t('keyPlaceholder');
  document.title = t('title');

  if (dashboard.classList.contains('hidden') === false) refresh();
  updateLastUpdated();
}

langSelect.addEventListener('change', applyLanguage);

/* ---- Formatting ---- */
function fmtCurrency(n) {
  if (n == null || isNaN(n)) return '—';
  return (n < 0 ? '-$' : '$') + Math.abs(n).toFixed(2);
}
function fmtTokens(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 10_000) return (n / 1_000).toFixed(1) + 'K';
  return n.toLocaleString();
}
function fmtNumber(n) {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString();
}
function fmtTime() {
  return new Date().toLocaleTimeString();
}

/* ---- Loading ---- */
function setLoading(on) {
  loadingCount += on ? 1 : -1;
  const show = loadingCount > 0;
  loading.classList.toggle('hidden', !show);
  dashboard.classList.toggle('hidden', show);
}

/* ---- API ---- */
function getKey() { return localStorage.getItem(KEY_STORAGE); }
function setKey(v) { v ? localStorage.setItem(KEY_STORAGE, v) : localStorage.removeItem(KEY_STORAGE); }
function headers() { return { 'Authorization': 'Bearer ' + getKey(), 'Content-Type': 'application/json' }; }

async function apiGet(path) {
  const res = await fetch(BASE + path, { headers: headers() });
  if (!res.ok) {
    let body = '';
    try { body = await res.text(); } catch (_) {}
    throw new Error('HTTP ' + res.status + (body ? ': ' + body.slice(0, 300) : ''));
  }
  return res.json();
}

function showError(msg) {
  if (!msg) { errorEl.classList.add('hidden'); return; }
  errorEl.textContent = msg;
  errorEl.classList.remove('hidden');
}

/* ---- Data processing ---- */
function processActivity(items) {
  if (!items || !items.length) return null;

  const byModel = {};
  let totalReqs = 0, totalPrompt = 0, totalCompletion = 0;
  const periodReqs = { today: 0, week: 0, month: 0 };
  const periodToks = { today: 0, week: 0, month: 0 };

  const now = new Date();
  const today = now.toISOString().slice(0, 10);
  const wk = new Date(now); wk.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  const weekStart = wk.toISOString().slice(0, 10);
  const monthStart = now.toISOString().slice(0, 7) + '-01';

  for (const item of items) {
    const m = item.model || item.model_permaslug || 'unknown';
    if (!byModel[m]) byModel[m] = { requests: 0, prompt: 0, completion: 0, cost: 0 };
    byModel[m].requests += item.requests || 0;
    byModel[m].prompt += item.prompt_tokens || 0;
    byModel[m].completion += item.completion_tokens || 0;
    byModel[m].cost += item.usage || 0;
    totalReqs += item.requests || 0;
    totalPrompt += item.prompt_tokens || 0;
    totalCompletion += item.completion_tokens || 0;

    const d = item.date;
    const r = item.requests || 0;
    const to = (item.prompt_tokens || 0) + (item.completion_tokens || 0);
    if (d === today) { periodReqs.today += r; periodToks.today += to; }
    if (d >= weekStart) { periodReqs.week += r; periodToks.week += to; }
    if (d >= monthStart) { periodReqs.month += r; periodToks.month += to; }
  }

  const sorted = [...items].sort((a, b) => b.date.localeCompare(a.date));
  const modelSorted = Object.entries(byModel).sort((a, b) => b[1].requests - a[1].requests);

  return { totalReqs, totalPrompt, totalCompletion, modelSorted, sorted, periodReqs, periodToks };
}

/* ---- Render ---- */
function renderKeyData(d) {
  if (!d.data) {
    for (const id of ['totalLimit', 'totalUsed', 'remaining', 'todayUsage', 'weekUsage', 'monthUsage']) {
      $('#' + id).textContent = '—';
    }
    $('#remaining').className = 'value';
    $('#keyExpiry').className = 'hidden';
    return;
  }

  const { limit, usage: used, limit_remaining: remaining,
          usage_daily, usage_weekly, usage_monthly, expires_at } = d.data;

  if (limit != null) {
    $('#totalLimit').textContent = fmtCurrency(limit);
  } else {
    $('#totalLimit').textContent = t('noLimitSet');
    $('#totalLimit').style.fontSize = '14px';
  }

  $('#totalUsed').textContent = fmtCurrency(used);
  const remainingEl = $('#remaining');
  remainingEl.textContent = fmtCurrency(remaining);
  remainingEl.className = 'value';
  if (remaining != null) {
    if (remaining <= 0) remainingEl.classList.add('red');
    else if (limit != null && remaining < limit * 0.2) remainingEl.classList.add('yellow');
    else if (limit == null && remaining < 1) remainingEl.classList.add('yellow');
    else remainingEl.classList.add('green');
  }

  $('#todayUsage').textContent = fmtCurrency(usage_daily);
  $('#weekUsage').textContent = fmtCurrency(usage_weekly);
  $('#monthUsage').textContent = fmtCurrency(usage_monthly);

  const expiryEl = $('#keyExpiry');
  if (!expires_at) {
    expiryEl.className = 'hidden';
  } else {
    const diff = new Date(expires_at) - new Date();
    const days = Math.ceil(diff / 86400000);
    if (days <= 0) {
      expiryEl.textContent = t('keyExpired');
      expiryEl.className = 'danger';
    } else if (days <= 7) {
      expiryEl.textContent = tfmt('keyExpires', { d: days });
      expiryEl.className = 'warn';
    } else {
      expiryEl.className = 'hidden';
    }
  }
}

function renderCreditsData(d) {
  if (!d.data) {
    for (const id of ['creditsPurchased', 'creditsConsumed', 'creditsRemaining']) {
      $('#' + id).textContent = '—';
    }
    $('#creditsRemaining').className = 'value';
    return;
  }

  const { total_credits, total_usage } = d.data;
  const purchased = total_credits ?? 0;
  const consumed = total_usage ?? 0;
  const remaining = purchased - consumed;

  $('#creditsPurchased').textContent = fmtCurrency(purchased);
  $('#creditsConsumed').textContent = fmtCurrency(consumed);

  const el = $('#creditsRemaining');
  el.textContent = fmtCurrency(remaining);
  el.className = 'value';
  if (remaining <= 0) el.classList.add('red');
  else if (remaining < purchased * 0.2) el.classList.add('yellow');
  else el.classList.add('green');
}

function renderActivityData(result) {
  const tbody = $('#modelBody');
  if (!result) {
    $('#totalRequests').textContent = '—';
    $('#totalPromptTokens').textContent = '—';
    $('#totalCompletionTokens').textContent = '—';
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-secondary);text-align:center;padding:24px;">' + t('noActivity') + '</td></tr>';
    return;
  }

  const { totalReqs, totalPrompt, totalCompletion, modelSorted } = result;
  $('#totalRequests').textContent = fmtNumber(totalReqs);
  $('#totalPromptTokens').textContent = fmtTokens(totalPrompt);
  $('#totalCompletionTokens').textContent = fmtTokens(totalCompletion);

  tbody.innerHTML = '';
  for (const [model, data] of modelSorted) {
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td class="model-name" title="${model}">${model}</td>
        <td class="numeric">${fmtNumber(data.requests)}</td>
        <td class="numeric">${fmtTokens(data.prompt)}</td>
        <td class="numeric">${fmtTokens(data.completion)}</td>
        <td class="numeric">${fmtCurrency(data.cost)}</td>
      </tr>`);
  }
}

function renderActivityLog(result) {
  const tbody = $('#logBody');
  if (!result) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-secondary);text-align:center;padding:24px;">' + t('noRecords') + '</td></tr>';
    return;
  }

  const { sorted, periodReqs, periodToks } = result;

  const fmtP = v => v === 0 && !sorted.some(i => i.date >= new Date().toISOString().slice(0, 10))
    ? '—' : fmtNumber(v);
  $('#todayActivity').textContent = fmtP(periodReqs.today) + ' / ' + fmtP(periodToks.today);
  $('#weekActivity').textContent = fmtNumber(periodReqs.week) + ' / ' + fmtTokens(periodToks.week);
  $('#monthActivity').textContent = fmtNumber(periodReqs.month) + ' / ' + fmtTokens(periodToks.month);

  tbody.innerHTML = '';
  for (const item of sorted) {
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td style="white-space:nowrap;font-size:12px;color:var(--text-secondary)">${item.date}</td>
        <td class="model-name" title="${item.model}">${item.model}</td>
        <td style="font-size:12px">${item.provider_name || '—'}</td>
        <td class="numeric">${fmtNumber(item.requests)}</td>
        <td class="numeric">${fmtTokens(item.prompt_tokens)}</td>
        <td class="numeric">${fmtTokens(item.completion_tokens)}</td>
        <td class="numeric">${fmtCurrency(item.usage)}</td>
      </tr>`);
  }
}

function updateLastUpdated() {
  lastUpdated.textContent = t('updatedAt') + fmtTime();
}

/* ---- Main refresh ---- */
async function refresh() {
  showError(null);
  const key = getKey();
  if (!key) {
    dashboard.classList.add('hidden');
    loading.classList.add('hidden');
    return;
  }

  const results = await Promise.allSettled([
    apiGet('/key'), apiGet('/credits'), apiGet('/activity'),
  ]);

  const keyData = results[0].status === 'fulfilled' ? results[0].value : { error: results[0].reason.message };
  const creditsData = results[1].status === 'fulfilled' ? results[1].value : { error: results[1].reason.message };
  const activityResp = results[2].status === 'fulfilled' ? results[2].value : { error: results[2].reason.message };

  renderKeyData(keyData);
  renderCreditsData(creditsData);

  if (activityResp.data) {
    const result = processActivity(activityResp.data);
    renderActivityData(result);
    renderActivityLog(result);
  } else {
    $('#totalRequests').textContent = t('needsMgmtKey');
    $('#totalPromptTokens').textContent = '';
    $('#totalCompletionTokens').textContent = '';
    $('#modelBody').innerHTML = '<tr><td colspan="5" style="color:var(--text-secondary);text-align:center;padding:24px;">' + t('needsMgmtKey') + '</td></tr>';
    $('#logBody').innerHTML = '<tr><td colspan="7" style="color:var(--text-secondary);text-align:center;padding:24px;">' + t('needsMgmtKey') + '</td></tr>';
    for (const id of ['todayActivity', 'weekActivity', 'monthActivity']) $('#' + id).textContent = '—';
  }

  updateLastUpdated();
}

/* ---- Timer ---- */
function startTimer() {
  stopTimer();
  const now = new Date();
  const sec = now.getSeconds();
  const ms = now.getMilliseconds();
  const toNext = sec < 30 ? (30 - sec) * 1000 - ms : (60 - sec) * 1000 - ms;
  refreshTimer = setTimeout(() => {
    refresh();
    refreshTimer = setInterval(refresh, REFRESH_INTERVAL);
  }, toNext);
}
function stopTimer() {
  if (refreshTimer) { clearTimeout(refreshTimer); clearInterval(refreshTimer); refreshTimer = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopTimer(); }
  else if (getKey()) { refresh(); startTimer(); }
});

/* ---- Key UI ---- */
toggleKeyVis.addEventListener('click', () => {
  if (apiKeyInput.type === 'password') { apiKeyInput.type = 'text'; toggleKeyVis.textContent = '\u{1f441}'; }
  else { apiKeyInput.type = 'password'; toggleKeyVis.textContent = '\u{1f441}'; }
});

saveKeyBtn.addEventListener('click', () => {
  const val = apiKeyInput.value.trim();
  if (!val) { showError(t('enterKey')); return; }
  setKey(val);
  showError(null);
  dashboard.classList.remove('hidden');
  setLoading(true);
  refresh().then(() => setLoading(false));
  startTimer();
});

clearKeyBtn.addEventListener('click', () => {
  setKey(null);
  apiKeyInput.value = '';
  dashboard.classList.add('hidden');
  loading.classList.add('hidden');
  showError(null);
  stopTimer();
});

refreshBtn.addEventListener('click', () => {
  refreshBtn.classList.add('spinning');
  refresh().finally(() => refreshBtn.classList.remove('spinning'));
});
apiKeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKeyBtn.click(); });

/* ---- Init ---- */
function init() {
  currentLang = localStorage.getItem(LANG_STORAGE) || 'zh-CN';
  langSelect.value = currentLang;

  const savedKey = getKey();
  if (savedKey) {
    apiKeyInput.value = savedKey;
    dashboard.classList.remove('hidden');
    setLoading(true);
    refresh().then(() => setLoading(false));
    startTimer();
  }

  // restore theme
  const savedTheme = localStorage.getItem(THEME_STORAGE) || 'auto';
  themeSelect.value = savedTheme;
  applyTheme(savedTheme);
  startThemeTimer();

  // apply language to static text
  apiKeyInput.placeholder = t('keyPlaceholder');
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  const tl = { light: '\u2600\u{fe0f} ', dark: '\u{1f319} ', auto: '\u{1f504} ' };
  const tk = { light: 'themeLight', dark: 'themeDark', auto: 'themeAuto' };
  for (const [v, k] of Object.entries(tk)) {
    const o = themeSelect.querySelector('option[value="' + v + '"]');
    if (o) o.textContent = tl[v] + t(k);
  }
}

init();
</script>
</body>
</html>
